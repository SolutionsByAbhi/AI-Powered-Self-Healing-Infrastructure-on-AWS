description: Restart Kubernetes Pod

schemaVersion: '0.3'

parameters:

  Cluster:

    type: String

  Namespace:

    type: String

  Pod:

    type: String

mainSteps:

- name: RestartPod

  action: aws:runShellScript

  inputs:

    runCommand:

      - aws eks update-kubeconfig --name {{ Cluster }}

      - kubectl delete pod {{ Pod }} -n {{ Namespace }}
